# Build and push the application container image to GHCR.
#
# Triggered when Release Please publishes a GitHub Release (vX.Y.Z tag).
# Produces versioned tags on ghcr.io/ff-fab/gas2mqtt:
#
#   ghcr.io/ff-fab/gas2mqtt:v1.2.3   exact release tag
#   ghcr.io/ff-fab/gas2mqtt:v1.2     minor floating tag
#   ghcr.io/ff-fab/gas2mqtt:v1       major floating tag
#   ghcr.io/ff-fab/gas2mqtt:latest   latest stable release
#
# Multi-arch: linux/amd64 (x86 servers) + linux/arm64 + linux/arm/v7 (Raspberry Pi).

name: Container

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write # Required to push to GHCR

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (cross-compilation for ARM)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ff-fab/gas2mqtt
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

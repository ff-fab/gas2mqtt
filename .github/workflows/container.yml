# Manual container rebuild — pushes latest to GHCR on demand.
#
# For automated release builds, see release-please.yml which runs the
# container build inline after creating a GitHub Release. That workflow
# avoids the GitHub Actions restriction blocking GITHUB_TOKEN-created
# events from triggering other workflow runs.

name: Container

on:
  workflow_dispatch: # Ad-hoc rebuild (e.g. base image security patch)

permissions:
  contents: read
  packages: write # Required to push to GHCR

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (cross-compilation for ARM)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/ff-fab/gas2mqtt:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

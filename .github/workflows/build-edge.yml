# Build edge image — rebuilds and pushes the edge tag to GHCR on demand.
#
# edge always reflects the current HEAD of main, regardless of release status.
# Use this for base image security patches or to verify a build between releases.
#
# Tag strategy:
#   edge    — current HEAD of main (this workflow + release-please.yml on release)
#   latest  — latest stable release (release-please.yml only)
#
# For automated release builds (latest + versioned tags), see release-please.yml.
# That workflow avoids the GitHub Actions restriction blocking GITHUB_TOKEN-created
# events from triggering other workflow runs.

name: Build edge image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and push edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (cross-compilation for ARM)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ghcr.io/ff-fab/gas2mqtt:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
